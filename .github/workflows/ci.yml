name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================================
  # 测试 + 静态检查
  # ============================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build (Linux)
        run: go build -o /dev/null ./cmd/main.go

  # ============================================================
  # 构建 Windows 二进制 + 发布到 Release
  # ============================================================
  build-windows:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=windows GOARCH=${{ matrix.arch }} go build \
            -trimpath -ldflags="-s -w" \
            -o win-command-${{ matrix.arch }}.exe \
            ./cmd/main.go

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: win-command-${{ matrix.arch }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 代码格式化检查
  # ============================================================
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
