name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Windows amd64
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o win-command-amd64.exe \
            ./cmd/main.go

      - name: Build Windows arm64
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=windows GOARCH=arm64 go build \
            -trimpath -ldflags="-s -w" \
            -o win-command-arm64.exe \
            ./cmd/main.go

      - name: List artifacts
        run: ls -la *.exe

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            win-command-amd64.exe
            win-command-arm64.exe
          generate_release_notes: true
